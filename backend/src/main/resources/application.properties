# Quarkus - ConfiguraĂ§Ă£o da AplicaĂ§Ă£o

# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=fintrack
quarkus.datasource.password=fintrack123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/fintrack
quarkus.datasource.jdbc.max-size=20

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=no-file

# HTTP
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Type

# Swagger
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=FinTrack API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API de Controle Financeiro Pessoal

# Logging
quarkus.log.level=INFO
quarkus.log.category."br.com.fintrack".level=DEBUG


